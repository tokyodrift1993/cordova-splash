version: 2

updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'tuesday'
      time: '06:00'
      timezone: 'Europe/Zurich'
    open-pull-requests-limit: 10
    labels:
      - 'dependencies'
    commit-message:
      prefix: 'chore'
    groups:
      npm-patch-minor:
        update-types:
          - 'minor'
          - 'patch'
